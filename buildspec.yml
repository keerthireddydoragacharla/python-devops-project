version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo Installing dependencies...
      - pip install -r requirements.txt
      - pip install pytest bandit flake8

  pre_build:
    commands:
      - echo Running Unit Tests...
      - pytest

      - echo Running Security Scan...
      - bandit -r .

      - echo Running Code Quality Check...
      - flake8 .

      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  build:
    commands:
      - echo Building Docker image...
      - docker build -t python-devops-project .

      - echo Tagging Docker image...
      - docker tag python-devops-repo:latest 983488059002.dkr.ecr.eu-north-1.amazonaws.com/python-devops-repo:latest

  post_build:
    commands:
      - echo Pushing image to ECR...
      - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/python-devops-project:latest

      - echo Build completed successfully
