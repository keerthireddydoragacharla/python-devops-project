version: 0.2

phases:
  install:
    commands:
      - pip install bandit pytest
  pre_build:
    commands:
      - aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin 983488059002.dkr.ecr.eu-north-1.amazonaws.com
      - echo "Running security scans..."
      - bandit -r .
      - echo "Running unit tests..."
      - pytest
  build:
    commands:
      - echo "Building the Docker image..."
      - docker build -t $ImageName -f ./Dockerfile .
      - docker images
  post_build:
    commands:
      - echo "Pushing the Docker image..."
      - docker tag $ImageName:latest 983488059002.dkr.ecr.eu-north-1.amazonaws.com/$ImageName:latest
      - docker push 983488059002.dkr.ecr.eu-north-1.amazonaws.com/$ImageName:latest
