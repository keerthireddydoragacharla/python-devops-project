<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - DevOps Store</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        .navbar{
            background:#1e293b;
            padding:20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            color:white;
            font-size:28px;
            font-weight:bold;
        }

        .nav-links a{
            color:white;
            text-decoration:none;
            margin-left:20px;
        }

        .hero{
            text-align:center;
            padding:50px;
            background:linear-gradient(to right,#667eea,#764ba2);
            color:white;
        }

        .hero h1{
            font-size:50px;
            margin-bottom:10px;
        }

        .products{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:25px;
            padding:40px;
        }

        .card{
            background:white;
            border-radius:15px;
            overflow:hidden;
            box-shadow:0 4px 15px rgba(0,0,0,0.2);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-10px);
        }

        .image{
            height:180px;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:80px;
            background:#f8fafc;
        }

        .content{
            padding:20px;
            text-align:center;
        }

        .price{
            color:green;
            font-size:24px;
            font-weight:bold;
            margin:10px 0;
        }

        .btn{
            background:#667eea;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:8px;
            cursor:pointer;
        }

        .btn:hover{
            background:#4f46e5;
        }

        footer{
            text-align:center;
            padding:20px;
            background:#1e293b;
            color:white;
        }

    </style>
</head>

<body>

    <div class="navbar">
        <div class="logo">🛒 DevOps Store</div>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/products">Products</a>
        </div>
    </div>

    <div class="hero">
        <h1>Explore Our Products</h1>
        <p>Quality Products for Every Developer</p>
    </div>

    <div class="products">

        <div class="card">
            <div class="image">💻</div>
            <div class="content">
                <h2>
    <a href="/product/Laptop">Laptop</a>
</h2>
                <p class="price">₹50,000</p>
               <a href="/add-to-cart/Laptop">
    <button class="btn">Add to Cart</button>
</a>
            </div>
        </div>

        <div class="card">
            <div class="image">🎧</div>
            <div class="content">
                <h2>Headphones</h2>
                <p class="price">₹2,000</p>
                 <a href="/add-to-cart/Headphones">
    <button class="btn">Add to Cart</button>
</a>
            </div>
        </div>

        <div class="card">
            <div class="image">⌨️</div>
            <div class="content">
               <a href="/product/Keyboards">Keyboard</a>
</h2>
                <p class="price">₹1,500</p>
                 <a href="/add-to-cart/Keyboard">
    <button class="btn">Add to Cart</button>
</a>
            </div>
        </div>

        <div class="card">
            <div class="image">🖱️</div>
            <div class="content">
              <a href="/product/Mouse">Mouse</a>
</h2>
                <p class="price">₹800</p>
                 <a href="/add-to-cart/Mouse">
    <button class="btn">Add to Cart</button>
</a>
            </div>
        </div>

        <div class="card">
            <div class="image">🖥️</div>
            <div class="content">
               <a href="/product/Monitor">Monitor</a>
</h2>
                <p class="price">₹15,000</p>
                 <a href="/add-to-cart/Monitor">
    <button class="btn">Add to Cart</button>
</a>
            </div>
        </div>

        <div class="card">
            <div class="image">📱</div>
            <div class="content">
               <a href="/product/SmartPhones">Smart Phone</a>
</h2>
                <p class="price">₹25,000</p>
                <a href="/add-to-cart/Laptop">
    <button class="btn">Add to Cart</button>
</a>
            </div>
        </div>

    </div>

    <footer>
        © 2026 DevOps Store | Flask Project
    </footer>

</body>
</html>
